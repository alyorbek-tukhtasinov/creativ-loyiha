<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HeartQuest 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700;800;900&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <!-- Particle Background -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- Canvas for confetti -->
  <canvas id="confettiCanvas"></canvas>

  <!-- Preview Badge -->
  <div class="preview-badge hidden" id="previewBadge">PREVIEW MODE</div>

  <!-- Mute Button -->
  <button class="mute-btn" id="muteBtn" title="Ovoz">🔊</button>

  <!-- Heartbeat indicator -->
  <div class="heartbeat-indicator" id="heartbeatIndicator">💓</div>

  <audio id="bgMusic" loop preload="auto" aria-hidden="true">
    <source src="../assets/music/background.mp3" type="audio/mpeg">
    <source src="../assets/music/background.ogg" type="audio/ogg">
  </audio>

  <!-- Loading Screen -->
  <div class="screen" id="screenLoading">
    <div class="loading-content">
      <div class="loading-heart">💕</div>
      <p class="loading-text">Sabr qiling...</p>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Intro Screen -->
  <div class="screen hidden" id="screenIntro">
    <div class="intro-card glass-card">
      <div class="intro-sender" id="introSender"></div>
      <div class="intro-emoji" id="introCategoryEmoji"></div>
      <h1 class="intro-title" id="introTitle"></h1>
      <p class="intro-message" id="introMessage"></p>
      <div class="intro-receiver" id="introReceiver"></div>
      <button class="btn-start" id="btnStart">
        O'yinni boshlash 🎮
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div class="screen hidden" id="screenGame">
    <!-- Progress -->
    <div class="progress-bar-container">
      <div class="progress-hearts" id="progressHearts"></div>
      <div class="question-counter" id="questionCounter"></div>
    </div>

    <!-- Streak Badge -->
    <div class="streak-badge hidden" id="streakBadge">🔥 Zo'r!</div>

    <!-- Question Card -->
    <div class="question-wrapper" id="questionWrapper">
      <div class="question-card glass-card" id="questionCard">
        <div class="question-emoji" id="questionEmoji"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>

        <!-- Feedback message -->
        <div class="feedback-msg hidden" id="feedbackMsg"></div>

        <!-- Hint -->
        <div class="hint-bubble hidden" id="hintBubble">
          <span>🤫 Psst... to'g'ri javob yuragingizda 💙</span>
        </div>
      </div>
    </div>

    <!-- Ghost Easter egg -->
    <div class="ghost-btn hidden" id="ghostBtn">Biz do'st bo'lolmaymiz 👻</div>
  </div>

  <!-- Reward Screen -->
  <div class="screen hidden" id="screenReward">
    <div class="reward-container" id="rewardContainer"></div>

    <!-- Stars -->
    <div class="stars-display" id="starsDisplay"></div>

    <!-- Actions -->
    <div class="reward-actions">
      <button class="btn-share-result" id="btnShareResult">📤 Ulashish</button>
      <button class="btn-screenshot" id="btnScreenshot">📸 Saqlash</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
